name: quarterly-retro

# Retrospectiva trimestral: verifica con búsqueda web qué pasó con las ideas
# destacadas del trimestre y calibra el gate. Costo ~$0.35-0.50 por corrida
# (tope de 20 búsquedas), 4 veces al año.
on:
  schedule:
    - cron: "0 14 1 1,4,7,10 *"  # día 1 de ene/abr/jul/oct, 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  retro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run quarterly retro
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.retro

      - name: Commit retro report
        run: |
          git config user.name "scouting-bot"
          git config user.email "actions@github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "retro: trimestral $(date -u +%Y-%m)"
            git pull --rebase origin main
            git push
          fi
