name: daily-collect

# Recolección diaria de candidatos SIN LLM. Este workflow NO tiene la
# ANTHROPIC_API_KEY a propósito: estructuralmente no puede gastar créditos.
on:
  schedule:
    - cron: "0 22 * * *"  # todos los días 22:00 UTC (~18:00 Chile)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect candidates (no API)
        env:
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
        run: python -m src.collect

      - name: Commit pool
        run: |
          git config user.name "scouting-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios en el pool"
          else
            git commit -m "collect: pool diario $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
