name: weekly-scouting

on:
  schedule:
    # Sábado 12:07 UTC (~08:00/09:00 Chile según horario). El minuto :00 en
    # punto es el más congestionado de GitHub Actions a nivel global (ahí
    # caen todos los crons del mundo) — 2026-07-18 se atrasó 46+ min por eso.
    # Corriendo en :07 se evita ese pico; igual puede atrasarse algo bajo carga.
    - cron: "7 12 * * 6"
  workflow_dispatch: {}  # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write  # necesario para commitear el reporte de vuelta

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scouting agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.main

      - name: Commit report
        run: |
          git config user.name "scouting-bot"
          git config user.email "actions@github.com"
          git add reports/ data/
          if git diff --staged --quiet; then
            echo "Sin cambios en reports/"
          else
            git commit -m "report: scouting semanal $(date -u +%Y-W%V)"
            git pull --rebase origin main
            git push
          fi
