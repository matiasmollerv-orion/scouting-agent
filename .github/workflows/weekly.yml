name: weekly-scouting

on:
  schedule:
    # Lunes 12:00 UTC (~08:00/09:00 Chile según horario). Actions corre en UTC
    # y puede retrasarse bajo carga; no es puntual al minuto.
    - cron: "0 12 * * 1"
  workflow_dispatch: {}  # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write  # necesario para commitear el reporte de vuelta

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scouting agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m src.main

      - name: Commit report
        run: |
          git config user.name "scouting-bot"
          git config user.email "actions@github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "Sin cambios en reports/"
          else
            git commit -m "report: scouting semanal $(date -u +%Y-W%V)"
            git push
          fi
